<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Management Dashboard</title>
  <style>
    :root {
      --primary-50: #eff6ff;
      --primary-100: #dbeafe;
      --primary-500: #3b82f6;
      --primary-600: #2563eb;
      --primary-700: #1d4ed8;
      --slate-50: #f8fafc;
      --slate-100: #f1f5f9;
      --slate-200: #e2e8f0;
      --slate-400: #94a3b8;
      --slate-600: #475569;
      --slate-800: #1e293b;
      --white: #ffffff;
      --shadow-card: 0 12px 32px rgba(15, 23, 42, 0.08);
      --radius-lg: 18px;
      --radius-md: 12px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Helvetica Neue", sans-serif;
      color: var(--slate-800);
      background:
        radial-gradient(circle at 0% 0%, var(--primary-100), transparent 40%),
        radial-gradient(circle at 100% 100%, #e0f2fe, transparent 45%),
        var(--slate-50);
    }
    .page { max-width: 1200px; margin: 0 auto; padding: 24px 16px 32px; }
    .header { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
    .title-wrap h1 { margin:0; font-size:1.6rem; font-weight:700; color: var(--primary-700); }
    .title-wrap p { margin:6px 0 0; color: var(--slate-600); font-size:0.95rem; }
    .btn { border:0; cursor:pointer; border-radius:10px; font-weight:600; transition:.2s; display:inline-flex; align-items:center; justify-content:center; }
    .btn-refresh { background:var(--white); color:var(--primary-700); border:1px solid var(--primary-100); padding:10px 14px; box-shadow:0 6px 18px rgba(37,99,235,.12); }
    .btn-refresh:hover { transform: translateY(-1px); background: var(--primary-50); }
    .grid { display:grid; grid-template-columns:1.65fr 1fr; gap:18px; align-items:start; }
    .card { background:var(--white); border:1px solid var(--slate-100); border-radius:var(--radius-lg); box-shadow:var(--shadow-card); overflow:hidden; }
    .card-head { border-bottom:1px solid var(--slate-100); padding:16px 18px; display:flex; align-items:center; justify-content:space-between; }
    .card-head h2 { margin:0; font-size:1.05rem; }
    .card-body { padding:16px 18px 18px; }
    .table-wrap { overflow-x:auto; border-radius:var(--radius-md); border:1px solid var(--slate-100); }
    table { width:100%; border-collapse:collapse; min-width:720px; background:var(--white); }
    thead th { text-align:left; font-size:.84rem; text-transform:uppercase; color:#dbeafe; background:linear-gradient(90deg,var(--primary-700),var(--primary-600)); padding:12px 14px; white-space:nowrap; }
    tbody td { padding:11px 14px; border-bottom:1px solid var(--slate-100); font-size:.94rem; vertical-align:middle; }
    tbody tr:nth-child(even) { background:#fcfdff; }
    tbody tr:hover { background:var(--primary-50); }
    .thumb { width:56px; height:72px; border-radius:10px; border:1px solid var(--slate-200); object-fit:cover; display:block; background:#eef2ff; }
    .thumb-fallback { width:56px; height:72px; border-radius:10px; border:1px solid var(--slate-200); background:linear-gradient(180deg,#dbeafe,#bfdbfe); color:#1e40af; font-weight:700; display:flex; align-items:center; justify-content:center; }
    .book-title { font-weight:700; color:#0f172a; }
    .subtle { color:var(--slate-600); font-size:.86rem; }
    .form-grid { display:grid; grid-template-columns:1fr; gap:12px; }
    .field label { display:block; font-size:.86rem; color:var(--slate-600); margin-bottom:6px; font-weight:600; }
    .field input, .field textarea { width:100%; border:1px solid var(--slate-200); border-radius:10px; padding:11px 12px; background:#fbfdff; color:var(--slate-800); outline:none; font:inherit; transition:.2s; }
    .field textarea { min-height:90px; resize:vertical; }
    .field input:focus, .field textarea:focus { border-color:var(--primary-500); box-shadow:0 0 0 4px rgba(59,130,246,.16); background:var(--white); }
    .file-hint { margin-top:5px; color:var(--slate-400); font-size:.8rem; }
    .btn-submit { margin-top:4px; width:100%; padding:12px 14px; border-radius:12px; font-size:1rem; background:linear-gradient(90deg,var(--primary-600),var(--primary-500)); color:var(--white); box-shadow:0 12px 24px rgba(37,99,235,.22); }
    .btn-submit:hover { transform:translateY(-1px); box-shadow:0 16px 28px rgba(37,99,235,.28); background:linear-gradient(90deg,var(--primary-700),var(--primary-600)); }
    .flash { display:none; }
    @media (max-width: 980px) { .grid{grid-template-columns:1fr;} .card-body{padding:14px;} .page{padding:14px 12px 24px;} }
    @media (max-width: 560px) { .title-wrap h1{font-size:1.3rem;} thead th,tbody td{padding:10px;font-size:.86rem;} .thumb,.thumb-fallback{width:50px;height:66px;} }
  </style>
</head>
<body>
  <div class="page">
    <header class="header">
      <div class="title-wrap">
        <h1>Book Management Dashboard</h1>
        <p>Quan ly danh sach sach, cap nhat nhanh va dong bo theo thoi gian thuc.</p>
      </div>
      <button class="btn btn-refresh" id="refresh" type="button">Refresh List</button>
    </header>

    <main class="grid">
      <section class="card">
        <div class="card-head">
          <h2>Danh Sach Sach</h2>
          <span class="subtle" id="bookCount">0 books</span>
        </div>
        <div class="card-body">
          <div class="table-wrap">
            <table id="booksTable" class="bookTable" data-legacy-id="bookTable">
              <thead>
                <tr>
                  <th>Cover</th>
                  <th>Title</th>
                  <th>Author</th>
                  <th>Category</th>
                  <th>Price</th>
                  <th>Stock</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="card-head"><h2>Them Sach Moi</h2></div>
        <div class="card-body">
          <form id="bookForm" class="addBookForm" data-legacy-id="addBookForm">
            <div class="form-grid">
              <div class="field"><label for="title">Title</label><input id="title" name="title" required /></div>
              <div class="field"><label for="description">Description</label><textarea id="description" name="description" placeholder="Mo ta ngan ve noi dung sach"></textarea></div>
              <div class="field"><label for="author">Author ID</label><input id="author" name="author" required /></div>
              <div class="field"><label for="category">Category ID</label><input id="category" name="category" required /></div>
              <div class="field"><label for="price">Price</label><input id="price" name="price" type="number" min="0" step="0.01" required /></div>
              <div class="field"><label for="stock">Stock</label><input id="stock" name="stock" type="number" min="0" required /></div>
              <div class="field"><label for="coverImage">Cover Image</label><input id="coverImage" name="coverImage" type="file" accept="image/*" /><div class="file-hint">Anh bia hien thi dang thumbnail (50px-70px rong).</div></div>
              <div class="field"><label for="token">JWT Token (admin)</label><input id="token" name="token" placeholder="Bearer token" required /></div>
              <button class="btn btn-submit" type="submit">Add Book</button>
            </div>
          </form>
        </div>
      </section>
    </main>
  </div>

  <div class="flash" id="flash"></div>

  <script src="http://localhost:5000/socket.io/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script>
    const API = "http://localhost:5000/api";
    const API_ORIGIN = "http://localhost:5000";
    const booksTable = document.getElementById("booksTable");
    const bookForm = document.getElementById("bookForm");
    const bookCount = document.getElementById("bookCount");

    const toast = Swal.mixin({ toast:true, position:"top-end", showConfirmButton:false, timer:4500, timerProgressBar:true });
    const showToast = (icon, title) => toast.fire({ icon, title });

    const getCoverUrl = (coverImage) => {
      if (!coverImage) return "";
      if (coverImage.startsWith("http://") || coverImage.startsWith("https://")) return coverImage;
      return `${API_ORIGIN}${coverImage}`;
    };

    const renderCoverCell = (book) => {
      const coverUrl = getCoverUrl(book.coverImage);
      if (coverUrl) {
        return `<img class="thumb" src="${coverUrl}" alt="${book.title || "book"}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" /><div class="thumb-fallback" style="display:none;">No</div>`;
      }
      return `<div class="thumb-fallback">No</div>`;
    };

    const buildRowHtml = (b) => `
      <tr data-book-id="${b._id || ""}">
        <td>${renderCoverCell(b)}</td>
        <td><div class="book-title">${b.title || "Untitled"}</div><div class="subtle">${b._id || ""}</div></td>
        <td>${b.author?.name || ""}</td>
        <td>${b.category?.name || ""}</td>
        <td>${Number(b.price || 0).toLocaleString()} VND</td>
        <td>${b.stock ?? "-"}</td>
      </tr>
    `;

    const updateBookCount = () => {
      const rows = booksTable.querySelectorAll("tbody tr").length;
      bookCount.textContent = `${rows} books`;
    };

    const prependOrReplaceBookRow = (book) => {
      if (!book || !book._id) return;
      const tbody = booksTable.querySelector("tbody");
      const existingRow = tbody.querySelector(`tr[data-book-id="${book._id}"]`);
      if (existingRow) {
        existingRow.outerHTML = buildRowHtml(book);
      } else {
        tbody.insertAdjacentHTML("afterbegin", buildRowHtml(book));
      }
      updateBookCount();
    };

    async function loadBooks() {
      try {
        const res = await fetch(`${API}/books`);
        const data = await res.json();
        const tbody = booksTable.querySelector("tbody");
        tbody.innerHTML = data.map((b) => buildRowHtml(b)).join("");
        updateBookCount();
      } catch (_) {
        showToast("error", "Khong tai duoc danh sach sach");
      }
    }

    document.getElementById("refresh").addEventListener("click", loadBooks);

    bookForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const formData = new FormData(bookForm);
      const token = formData.get("token");
      formData.delete("token");

      try {
        const res = await fetch(`${API}/books`, { method:"POST", headers:{ Authorization:`Bearer ${token}` }, body:formData });
        const payload = await res.json();
        if (res.ok) {
          showToast("success", "Da them sach thanh cong");
          await loadBooks();
          bookForm.reset();
        } else {
          showToast("error", payload.message || "Co loi xay ra");
        }
      } catch (_) {
        showToast("error", "Khong ket noi duoc server");
      }
    });

    const socket = io("http://localhost:5000");

    socket.on("newBook", (payload) => {
      const book = payload?.book || payload;
      showToast("success", payload?.message || `Sach moi: ${book?.title || "Khong ro ten"}`);
      prependOrReplaceBookRow(book);
    });

    // Backward compatibility with backend event currently used in project
    socket.on("book:new", (payload) => {
      const book = payload?.book || payload;
      showToast("info", payload?.message || `Sach moi: ${book?.title || "Khong ro ten"}`);
      prependOrReplaceBookRow(book);
    });

    socket.on("order:update", () => { showToast("success", "Trang thai don hang da duoc cap nhat"); });

    loadBooks();
  </script>
</body>
</html>
